<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Test</title>
<style>
  body { font-family: monospace; padding: 20px; background: #111; color: #fff; }
  video { width: 100%; max-width: 400px; display: block; }
  #result { margin-top: 20px; font-size: 18px; color: #0f0; word-break: break-all; }
  #status { margin-top: 10px; color: #aaa; font-size: 13px; }
  button { margin-top: 16px; padding: 14px 24px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<h2>QR Scanner Test</h2>
<button onclick="start()">Start Camera</button>
<br><br>
<video id="v" autoplay playsinline></video>
<canvas id="c" style="display:none"></canvas>
<div id="status">Not started</div>
<div id="result">—</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script>
async function start() {
  document.getElementById('status').textContent = 'Requesting camera...';
  const video = document.getElementById('v');
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment' }
  });
  video.srcObject = stream;
  video.play();
  document.getElementById('status').textContent = 'Camera running — scanning every 300ms';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  setInterval(() => {
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'attemptBoth' });
    if (code) {
      document.getElementById('result').textContent = '✓ ' + code.data;
      document.getElementById('status').textContent = 'Scanned!';
    }
  }, 300);
}
</script>
</body>
</html>
