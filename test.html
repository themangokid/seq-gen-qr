<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Test</title>
<style>
  body { font-family: monospace; padding: 20px; background: #111; color: #fff; }
  video { width: 100%; max-width: 400px; display: block; border: 2px solid #333; }
  #result { margin-top: 20px; font-size: 18px; color: #0f0; word-break: break-all; min-height: 40px; }
  #status { margin-top: 10px; color: #aaa; font-size: 13px; }
</style>
</head>
<body>
<h2>QR Test — nimiq/qr-scanner</h2>
<video id="v"></video>
<div id="status">Starting…</div>
<div id="result">—</div>

<script type="module">
  import QrScanner from 'https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js';

  QrScanner.WORKER_PATH = 'https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner-worker.min.js';

  const video = document.getElementById('v');
  const scanner = new QrScanner(
    video,
    result => {
      document.getElementById('result').textContent = '✓ ' + result.data;
      document.getElementById('status').textContent = 'Scanned at ' + new Date().toLocaleTimeString();
    },
    {
      preferredCamera: 'environment',
      highlightScanRegion: true,
      highlightCodeOutline: true,
    }
  );

  scanner.start().then(() => {
    document.getElementById('status').textContent = 'Camera running — point at a QR code';
  }).catch(err => {
    document.getElementById('status').textContent = 'Error: ' + err;
  });
</script>
</body>
</html>
