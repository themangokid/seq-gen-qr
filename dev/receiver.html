<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>QR Chain — Receiver</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#111;color:#eee;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#hdr{padding:8px 12px;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#hdr h1{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#555}
.pill{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600}
.pill.done{background:#1a3d27;color:#27ae60}
.pill.scan{background:#2d1414;color:#e74c3c}
.pill.idle{background:#1a1a1a;color:#555}
/* Camera */
#cam-box{flex-shrink:0;position:relative;background:#000;overflow:hidden;height:36vh}
#reader{width:100%;height:100%}
#reader video{width:100%!important;height:100%!important;object-fit:cover}
#cam-start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
#cam-start p{font-size:12px;color:#555;text-align:center;padding:0 20px}
#status-bar{background:rgba(0,0,0,.7);padding:5px 12px;font-size:11px;color:#aaa;letter-spacing:.04em;text-align:center;flex-shrink:0}
/* Timeline */
#tl{background:#161614;border-top:1px solid #222;border-bottom:1px solid #222;overflow-x:auto;padding:8px 10px;flex-shrink:0;display:none;scrollbar-width:thin;scrollbar-color:#333 transparent}
#tl-strip{display:flex;gap:3px;min-width:max-content}
.tc{width:24px;height:30px;border-radius:2px;background:#2a2a28;border:1px solid #3a3a38;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .1s}
.tc:hover{transform:scaleY(1.15)}
.tc-n{font-size:7px;color:#555}
.tc-b{width:12px;height:2px;border-radius:1px;background:#3a3a38;margin-top:2px}
.tc.got{background:#1a3d27;border-color:#27ae60}.tc.got .tc-n{color:#27ae60}.tc.got .tc-b{background:#27ae60}
.tc.miss{background:#2d1414;border-color:#e74c3c;animation:pulse 1.6s ease-in-out infinite}.tc.miss .tc-n{color:#e74c3c}.tc.miss .tc-b{background:#e74c3c}
@keyframes pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 2px rgba(224,76,60,.35)}}
/* Hint bar */
#hint{background:#c0392b;padding:6px 12px;font-size:12px;color:#fff;display:none;align-items:center;gap:8px;flex-shrink:0}
#hint span{flex:1}
#hint button{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px}
/* Output */
#out-wrap{flex:1;overflow-y:auto;padding:12px}
#out{font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word;color:#ddd}
#out.placeholder{color:#333}
/* Controls */
#btns{padding:10px 12px;display:flex;gap:8px;border-top:1px solid #222;flex-shrink:0}
button{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px}
.btn-p{background:#27ae60;color:#fff;flex:1}
.btn-p:hover{background:#219150}
.btn-s{background:#333;color:#eee}
.btn-s:hover{background:#444}
</style>
</head>
<body>
<div id="hdr">
  <h1>QR Chain · Receiver</h1>
  <span class="pill idle" id="prog-pill">waiting</span>
</div>

<div id="cam-box">
  <div id="cam-start">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <p>Tap Start Camera</p>
  </div>
  <div id="reader" style="display:none"></div>
</div>

<div id="status-bar">Ready</div>

<div id="tl"><div id="tl-strip"></div></div>
<div id="hint"><span id="hint-txt"></span><button onclick="document.getElementById('hint').style.display='none'">✕</button></div>

<div id="out-wrap">
  <div id="out" class="placeholder">Scan QR codes in sequence — text appears here…</div>
</div>

<div id="btns">
  <button class="btn-p" id="cam-btn" onclick="startCam()">Start Camera</button>
  <button class="btn-s" onclick="copyOut()">Copy</button>
  <button class="btn-s" onclick="resetAll()">Reset</button>
</div>

<script>
// ── State ─────────────────────────────────────────────────
let chunks     = {};   // idx → payload string
let total      = null;
let compressed = false;
let frontier   = 0;    // highest index seen

// ── Base64url decode ──────────────────────────────────────
function fromB64url(s) {
  const p = s.replace(/-/g,'+').replace(/_/g,'/');
  const b = atob(p);
  const a = new Uint8Array(b.length);
  for(let i=0;i<b.length;i++) a[i]=b.charCodeAt(i);
  return a;
}

// ── Protocol parser ───────────────────────────────────────
//
//  NEW compact:
//    chunk 1:  ~{idx}/{total}{Z|R}{data}
//    chunk N:  ~{idx}{data}
//
//  LEGACY (backward compat):
//    QRC|{idx}/{total}{Z}|{data}
//    QRC|{idx}|{data}
//
function parseQR(data) {
  if(data.charAt(0) === '~') {
    const body = data.slice(1);
    if(body.includes('/')) {
      // chunk 1
      const sl = body.indexOf('/');
      const idx = parseInt(body.slice(0,sl));
      let p = sl+1;
      while(p < body.length && body[p]>='0' && body[p]<='9') p++;
      const tot = parseInt(body.slice(sl+1,p));
      const flag = body[p];
      const payload = body.slice(p+1);
      if(isNaN(idx)||isNaN(tot)) return null;
      if(idx===1){ total=tot; compressed=(flag==='Z'); }
      return {idx, payload};
    } else {
      // chunk N: read digits then payload
      let p=0;
      while(p<body.length && body[p]>='0' && body[p]<='9') p++;
      const idx = parseInt(body.slice(0,p));
      return isNaN(idx)||!total ? null : {idx, payload:body.slice(p)};
    }
  }
  if(data.startsWith('QRC|')) {
    // legacy
    const parts = data.split('|');
    if(parts.length<3) return null;
    const meta = parts[1], payload = parts.slice(2).join('|');
    let idx, tot;
    if(meta.includes('/')) {
      const mc=meta.replace(/Z$/,'');
      compressed=meta.endsWith('Z');
      [idx,tot]=[parseInt(mc.split('/')[0]),parseInt(mc.split('/')[1])];
      if(idx===1) total=tot;
    } else {
      idx=parseInt(meta);
    }
    return isNaN(idx)||!total ? null : {idx, payload};
  }
  return null; // not our format
}

// ── Handle a scanned code ─────────────────────────────────
async function onScan(data) {
  const parsed = parseQR(data);
  if(!parsed) return;
  const {idx, payload} = parsed;
  if(chunks[idx]) return; // already have it

  chunks[idx] = payload;
  if(idx > frontier) frontier = idx;

  const got = Object.keys(chunks).length;
  const tot = total||'?';

  updateTimeline();
  updatePill(got, tot);
  setStatus(`✓ chunk ${idx}/${tot} — ${got<tot?'keep scanning…':'complete!'}`);

  if(typeof tot==='number' && got===tot) {
    await assemble();
  }
}

// ── Assemble & decompress ─────────────────────────────────
async function assemble() {
  const keys = Object.keys(chunks).map(Number).sort((a,b)=>a-b);
  const joined = keys.map(k=>chunks[k]).join('');

  let text;
  if(compressed) {
    // ensure pako
    if(typeof pako==='undefined') {
      try {
        const m = await import('https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.esm.mjs');
        window.pako = m.default||m;
      } catch(e) { setOutput('[pako not available — raw]: '+joined); return; }
    }
    try {
      const bytes = pako.inflate(fromB64url(joined));
      text = new TextDecoder().decode(bytes);
    } catch(e) {
      text = '[decompress error] '+e.message+'\n\nRaw: '+joined;
    }
  } else {
    text = joined;
  }
  setOutput(text);
}

// ── UI helpers ────────────────────────────────────────────
function setStatus(msg) { document.getElementById('status-bar').textContent = msg; }

function setOutput(text) {
  const el = document.getElementById('out');
  el.textContent = text;
  el.className = '';
}

function updatePill(got, tot) {
  const pill = document.getElementById('prog-pill');
  if(typeof tot==='number' && got===tot) {
    pill.textContent='done ✓'; pill.className='pill done';
  } else {
    pill.textContent=`${got}/${tot}`; pill.className='pill scan';
  }
}

function updateTimeline() {
  if(!total) return;
  const tl = document.getElementById('tl');
  tl.style.display='block';
  const strip = document.getElementById('tl-strip');

  // grow strip
  while(strip.children.length < total) {
    const i = strip.children.length+1;
    const cell = document.createElement('div'); cell.className='tc'; cell.dataset.i=i;
    const n=document.createElement('div'); n.className='tc-n'; n.textContent=i;
    const b=document.createElement('div'); b.className='tc-b';
    cell.appendChild(n); cell.appendChild(b); strip.appendChild(cell);
  }

  const missing=[];
  for(let i=1;i<=total;i++){
    const cell=strip.children[i-1];
    const got=!!chunks[i], miss=!got&&i<frontier;
    cell.className='tc'+(got?' got':miss?' miss':'');
    cell.onclick = miss ? ()=>showHint(i) : ()=>null;
    if(miss) missing.push(i);
  }

  // scroll to frontier
  tl.scrollLeft=Math.max(0,(frontier-4)*27);

  // hint summary
  if(missing.length===0){
    document.getElementById('hint').style.display='none';
  } else {
    document.getElementById('hint-txt').textContent=
      `Missing: ${missing.slice(0,8).join(', ')}${missing.length>8?` + ${missing.length-8} more`:''}  — jump sender to these frames`;
    document.getElementById('hint').style.display='flex';
  }
}

function showHint(n){
  document.getElementById('hint-txt').textContent=`Jump sender to frame ${n}`;
  document.getElementById('hint').style.display='flex';
}

// ── Camera ────────────────────────────────────────────────
let qrScanner = null;

async function startCam() {
  const readerEl = document.getElementById('reader');
  readerEl.style.display='block';
  document.getElementById('cam-start').style.display='none';
  document.getElementById('cam-btn').textContent='Camera on';
  document.getElementById('cam-btn').disabled=true;
  setStatus('Starting camera…');

  try {
    const {default:QrScanner} = await import('https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js');
    const video = document.createElement('video');
    readerEl.appendChild(video);
    qrScanner = new QrScanner(
      video,
      r => onScan(r.data),
      {
        onDecodeError:()=>{},
        preferredCamera:'environment',
        highlightScanRegion:true,
        returnDetailedScanResult:true,
        // Crop centre 70% — fewer pixels = faster decode
        calculateScanRegion: v => {
          const s=Math.round(Math.min(v.videoWidth,v.videoHeight)*0.7);
          return {x:Math.round((v.videoWidth-s)/2),y:Math.round((v.videoHeight-s)/2),
                  width:s,height:s,downScaledWidth:400,downScaledHeight:400};
        }
      }
    );
    await qrScanner.start();
    setStatus('Camera running — point at a QR code');
  } catch(e) {
    document.getElementById('cam-start').style.display='flex';
    readerEl.style.display='none';
    document.getElementById('cam-btn').disabled=false;
    document.getElementById('cam-btn').textContent='Start Camera';
    setStatus('Camera denied: '+e.message);
  }
}

function resetAll() {
  chunks={}; total=null; compressed=false; frontier=0;
  document.getElementById('out').textContent='Scan QR codes in sequence — text appears here…';
  document.getElementById('out').className='placeholder';
  document.getElementById('prog-pill').textContent='waiting';
  document.getElementById('prog-pill').className='pill idle';
  document.getElementById('tl').style.display='none';
  document.getElementById('tl-strip').innerHTML='';
  document.getElementById('hint').style.display='none';
  setStatus('Reset — ready to scan');
}

function copyOut() {
  const t=document.getElementById('out').textContent;
  if(!t||t.startsWith('Scan')) return;
  navigator.clipboard.writeText(t).then(()=>setStatus('Copied ✓')).catch(()=>setStatus('Copy failed'));
}
</script>
</body>
</html>
